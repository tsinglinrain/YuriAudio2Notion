server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name yuri.zyhq.de;

    ssl_certificate     /etc/nginx/ssl/zyhqde_cert.pem;
    ssl_certificate_key /etc/nginx/ssl/zyhqde_key.pem;

    add_header X-Frame-Options          "DENY"             always;
    add_header X-Content-Type-Options   "nosniff"          always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # 前端 SPA
    location / {
        proxy_pass http://127.0.0.1:xxxx;
    }

    # 健康检查
    location = /health {
        proxy_pass http://172.17.0.1:5050;
    }

    # SSE 流：禁用缓冲
    location = /logs/stream {
        proxy_pass http://172.17.0.1:5050;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # webhook 系列
    # if + return 是 nginx 文档明确的安全用法，proxy_pass 仅在 POST 时到达
    location ~ ^/webhook-(album|album-update|debug|audio|audio-update)$ {
        if ($request_method !~ ^(POST|GET)$) { return 405; }
        if ($request_method = GET) { return 302 /; }
        proxy_pass http://172.17.0.1:5050;
    }
}
